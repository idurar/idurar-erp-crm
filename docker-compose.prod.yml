version: '3.8'

# Production override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  mongodb:
    restart: always
    ports:
      - "127.0.0.1:27017:27017"  # Only expose to localhost
    command: mongod --auth --bind_ip_all

  backend:
    restart: always
    environment:
      NODE_ENV: production
    # Remove port mapping if using reverse proxy
    # ports:
    #   - "127.0.0.1:8888:8888"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: always
    # For production, use Nginx reverse proxy instead
    # This can be mapped to internal network only
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Add Nginx reverse proxy for production
  nginx-proxy:
    image: nginx:alpine
    container_name: idurar-nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - idurar-network

